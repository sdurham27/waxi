<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Waxi — Your Sets, On Wax</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Mono:wght@400;500&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<style>
  :root {
    --black: #080808;
    --white: #f0ede6;
    --cream: #e8e0d0;
    --gold: #c9a84c;
    --gold-light: #e2c47a;
    --groove: #1a1a1a;
    --muted: #555;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    background: var(--black);
    color: var(--white);
    font-family: 'DM Sans', sans-serif;
    min-height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
    overflow: hidden;
  }

  /* Vinyl record background */
  .vinyl-bg {
    position: fixed;
    right: -20vw;
    top: 50%;
    transform: translateY(-50%);
    width: 80vw;
    height: 80vw;
    max-width: 700px;
    max-height: 700px;
    border-radius: 50%;
    background: repeating-radial-gradient(
      circle at center,
      #111 0px,
      #111 2px,
      #161616 2px,
      #161616 4px
    );
    opacity: 0.6;
    animation: spin 20s linear infinite;
  }

  .vinyl-bg::before {
    content: '';
    position: absolute;
    inset: 42%;
    border-radius: 50%;
    background: radial-gradient(circle, var(--gold) 0%, #8a6a1a 60%, #3a2a05 100%);
  }

  .vinyl-bg::after {
    content: '';
    position: absolute;
    inset: 48%;
    border-radius: 50%;
    background: var(--black);
  }

  @keyframes spin {
    from { transform: translateY(-50%) rotate(0deg); }
    to   { transform: translateY(-50%) rotate(360deg); }
  }

  /* Grain overlay */
  body::after {
    content: '';
    position: fixed;
    inset: 0;
    background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noise'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noise)' opacity='0.04'/%3E%3C/svg%3E");
    pointer-events: none;
    z-index: 10;
    opacity: 0.4;
  }

  .container {
    position: relative;
    z-index: 5;
    width: 100%;
    max-width: 420px;
    padding: 2rem;
    animation: fadeUp 0.6s ease both;
  }

  @keyframes fadeUp {
    from { opacity: 0; transform: translateY(20px); }
    to   { opacity: 1; transform: translateY(0); }
  }

  .logo {
    font-family: 'Bebas Neue', sans-serif;
    font-size: 5rem;
    letter-spacing: 0.05em;
    line-height: 1;
    color: var(--white);
    margin-bottom: 0.2rem;
  }

  .logo span {
    color: var(--gold);
  }

  .tagline {
    font-family: 'DM Mono', monospace;
    font-size: 0.72rem;
    letter-spacing: 0.2em;
    color: var(--muted);
    text-transform: uppercase;
    margin-bottom: 3rem;
  }

  .card {
    background: #0f0f0f;
    border: 1px solid #222;
    border-radius: 4px;
    padding: 2rem;
  }

  .tabs {
    display: flex;
    gap: 0;
    margin-bottom: 1.8rem;
    border-bottom: 1px solid #222;
  }

  .tab {
    font-family: 'DM Mono', monospace;
    font-size: 0.75rem;
    letter-spacing: 0.1em;
    text-transform: uppercase;
    padding: 0.6rem 1.2rem;
    cursor: pointer;
    color: var(--muted);
    border-bottom: 2px solid transparent;
    margin-bottom: -1px;
    transition: color 0.2s, border-color 0.2s;
    background: none;
    border-top: none;
    border-left: none;
    border-right: none;
  }

  .tab.active {
    color: var(--gold);
    border-bottom-color: var(--gold);
  }

  .form-group {
    margin-bottom: 1.2rem;
  }

  label {
    display: block;
    font-family: 'DM Mono', monospace;
    font-size: 0.68rem;
    letter-spacing: 0.15em;
    text-transform: uppercase;
    color: var(--muted);
    margin-bottom: 0.5rem;
  }

  input {
    width: 100%;
    background: #080808;
    border: 1px solid #2a2a2a;
    color: var(--white);
    font-family: 'DM Mono', monospace;
    font-size: 0.9rem;
    padding: 0.75rem 1rem;
    border-radius: 2px;
    transition: border-color 0.2s;
    outline: none;
  }

  input:focus { border-color: var(--gold); }
  input::placeholder { color: #333; }

  .btn {
    width: 100%;
    padding: 0.9rem;
    background: var(--gold);
    color: #080808;
    border: none;
    border-radius: 2px;
    font-family: 'Bebas Neue', sans-serif;
    font-size: 1.3rem;
    letter-spacing: 0.1em;
    cursor: pointer;
    margin-top: 0.5rem;
    transition: background 0.2s, transform 0.1s;
  }

  .btn:hover { background: var(--gold-light); }
  .btn:active { transform: scale(0.99); }
  .btn:disabled { opacity: 0.4; cursor: not-allowed; }

  .message {
    margin-top: 1rem;
    font-family: 'DM Mono', monospace;
    font-size: 0.75rem;
    text-align: center;
    min-height: 1.2em;
  }

  .message.error { color: #ff6b6b; }
  .message.success { color: #6bffb8; }

  .panel { display: none; }
  .panel.active { display: block; }

  /* Top nav */
  .top-nav {
    position: fixed;
    top: 0; left: 0; right: 0;
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 1.2rem 2.5rem;
    z-index: 50;
  }

  .top-nav-logo {
    font-family: 'Bebas Neue', sans-serif;
    font-size: 1.6rem;
    letter-spacing: 0.08em;
    color: var(--white);
    text-decoration: none;
    opacity: 0.5;
    transition: opacity 0.2s;
  }
  .top-nav-logo:hover { opacity: 1; }
  .top-nav-logo span { color: var(--gold); }

  .top-nav-link {
    font-family: 'DM Mono', monospace;
    font-size: 0.7rem;
    letter-spacing: 0.1em;
    text-transform: uppercase;
    color: var(--muted);
    text-decoration: none;
    padding: 0.4rem 0.9rem;
    border: 1px solid #222;
    border-radius: 2px;
    transition: color 0.2s, border-color 0.2s;
  }
  .top-nav-link:hover { color: var(--white); border-color: #444; }
</style>
</head>
<body>

<nav class="top-nav">
  <a class="top-nav-logo" href="index.html">WAX<span>I</span></a>
  <a class="top-nav-link" href="pricing.html">Pricing</a>
</nav>

<div class="vinyl-bg"></div>

<div class="container">
  <div class="logo">WAX<span>I</span></div>
  <div class="tagline">Your sets, pressed forever</div>

  <div class="card">
    <div class="tabs">
      <button class="tab active" onclick="switchTab('login')">Log In</button>
      <button class="tab" onclick="switchTab('signup')">Sign Up</button>
    </div>

    <!-- Login -->
    <div class="panel active" id="panel-login">
      <div class="form-group">
        <label>Email</label>
        <input type="email" id="login-email" placeholder="you@example.com"/>
      </div>
      <div class="form-group">
        <label>Password</label>
        <input type="password" id="login-password" placeholder="••••••••"/>
      </div>
      <button class="btn" onclick="login()">Drop In</button>
      <div class="message" id="login-msg"></div>
    </div>

    <!-- Signup -->
    <div class="panel" id="panel-signup">
      <div class="form-group">
        <label>DJ Name</label>
        <input type="text" id="signup-name" placeholder="your DJ name"/>
      </div>
      <div class="form-group">
        <label>Email</label>
        <input type="email" id="signup-email" placeholder="you@example.com"/>
      </div>
      <div class="form-group">
        <label>Password</label>
        <input type="password" id="signup-password" placeholder="min 6 characters"/>
      </div>
      <button class="btn" onclick="signup()">Get on Waxi</button>
      <div class="message" id="signup-msg"></div>
    </div>
  </div>
</div>

<script>
  const { createClient } = supabase;
  const sb = createClient(
    'https://axhhkmobmvkznmkiplso.supabase.co',
    'sb_publishable_f0T6tAUq16w1d9s4Dssv-Q_y4OMLaYx'
  );

  // Redirect if already logged in
  sb.auth.getSession().then(({ data }) => {
    if (data.session) window.location.href = 'dashboard.html';
  });

  function switchTab(tab) {
    document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
    document.querySelectorAll('.panel').forEach(p => p.classList.remove('active'));
    event.target.classList.add('active');
    document.getElementById('panel-' + tab).classList.add('active');
  }

  function msg(id, text, type) {
    const el = document.getElementById(id);
    el.textContent = text;
    el.className = 'message ' + type;
  }

  async function login() {
    const email = document.getElementById('login-email').value.trim();
    const pass  = document.getElementById('login-password').value;
    if (!email || !pass) return msg('login-msg', 'Please fill in all fields.', 'error');

    const btn = document.querySelector('#panel-login .btn');
    btn.disabled = true;
    btn.textContent = 'Dropping in...';

    const { error } = await sb.auth.signInWithPassword({ email, password: pass });
    if (error) {
      msg('login-msg', error.message, 'error');
      btn.disabled = false;
      btn.textContent = 'Drop In';
    } else {
      window.location.href = 'dashboard.html';
    }
  }

  async function signup() {
    const name  = document.getElementById('signup-name').value.trim();
    const email = document.getElementById('signup-email').value.trim();
    const pass  = document.getElementById('signup-password').value;
    if (!name || !email || !pass) return msg('signup-msg', 'Please fill in all fields.', 'error');

    const btn = document.querySelector('#panel-signup .btn');
    btn.disabled = true;
    btn.textContent = 'Pressing...';

    const { data, error } = await sb.auth.signUp({
      email, password: pass,
      options: { data: { dj_name: name } }
    });

    btn.disabled = false;
    btn.textContent = 'Get on Waxi';

    if (error) {
      msg('signup-msg', error.message, 'error');
    } else if (data?.user?.identities?.length === 0) {
      // Supabase returns an empty identities array when the email is already registered
      msg('signup-msg', 'This email is already registered — try logging in instead.', 'error');
      setTimeout(() => {
        document.querySelectorAll('.tab')[0].click();
        document.getElementById('login-email').value = email;
      }, 1500);
    } else {
      msg('signup-msg', 'Check your email to confirm your account!', 'success');
    }
  }

  // Enter key support
  document.addEventListener('keydown', e => {
    if (e.key === 'Enter') {
      const active = document.querySelector('.panel.active');
      active.querySelector('.btn').click();
    }
  });
</script>
</body>
</html>
