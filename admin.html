<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Waxi — Admin</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Mono:wght@400;500&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<style>
  :root {
    --black: #080808;
    --white: #f0ede6;
    --gold: #c9a84c;
    --gold-light: #e2c47a;
    --groove: #111;
    --border: #1e1e1e;
    --muted: #555;
    --red: #e05555;
    --red-border: #5a2020;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    background: var(--black);
    color: var(--white);
    font-family: 'DM Sans', sans-serif;
    min-height: 100vh;
  }

  body::after {
    content: '';
    position: fixed;
    inset: 0;
    background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noise'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noise)' opacity='0.04'/%3E%3C/svg%3E");
    pointer-events: none;
    z-index: 100;
    opacity: 0.3;
  }

  /* Nav */
  nav {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 1.2rem 2.5rem;
    border-bottom: 1px solid var(--border);
    position: sticky;
    top: 0;
    background: rgba(8,8,8,0.95);
    backdrop-filter: blur(10px);
    z-index: 50;
  }

  .logo { font-family: 'Bebas Neue', sans-serif; font-size: 2rem; letter-spacing: 0.08em; text-decoration: none; color: inherit; }
  .logo span { color: var(--gold); }

  .admin-badge {
    font-family: 'DM Mono', monospace;
    font-size: 0.6rem;
    letter-spacing: 0.2em;
    background: var(--gold);
    color: #080808;
    padding: 0.2rem 0.5rem;
    border-radius: 2px;
    margin-left: 0.8rem;
    vertical-align: middle;
  }

  .nav-right { display: flex; align-items: center; gap: 1.5rem; }

  .dj-name {
    font-family: 'DM Mono', monospace;
    font-size: 0.75rem;
    color: var(--muted);
    letter-spacing: 0.1em;
  }

  .logout-btn {
    font-family: 'DM Mono', monospace;
    font-size: 0.7rem;
    letter-spacing: 0.1em;
    text-transform: uppercase;
    color: var(--muted);
    background: none;
    border: 1px solid #222;
    padding: 0.4rem 0.9rem;
    border-radius: 2px;
    cursor: pointer;
    transition: color 0.2s, border-color 0.2s;
  }
  .logout-btn:hover { color: var(--white); border-color: #444; }

  .nav-link {
    font-family: 'DM Mono', monospace;
    font-size: 0.7rem;
    letter-spacing: 0.1em;
    text-transform: uppercase;
    color: var(--muted);
    text-decoration: none;
    padding: 0.4rem 0.9rem;
    border-radius: 2px;
    transition: color 0.2s;
  }
  .nav-link:hover { color: var(--white); }

  /* Main */
  main { max-width: 1060px; margin: 0 auto; padding: 3rem 2rem 6rem; }

  .page-header { margin-bottom: 2.5rem; animation: fadeUp 0.5s ease both; }
  .page-title { font-family: 'Bebas Neue', sans-serif; font-size: 3.5rem; letter-spacing: 0.05em; line-height: 1; }
  .page-subtitle { font-family: 'DM Mono', monospace; font-size: 0.72rem; color: var(--muted); letter-spacing: 0.15em; text-transform: uppercase; margin-top: 0.5rem; }

  @keyframes fadeUp {
    from { opacity: 0; transform: translateY(12px); }
    to   { opacity: 1; transform: translateY(0); }
  }

  /* Stats bar */
  .stats {
    display: flex; gap: 1px; margin-bottom: 2.5rem;
    background: var(--border); border: 1px solid var(--border);
    border-radius: 4px; overflow: hidden;
    animation: fadeUp 0.5s 0.1s ease both;
  }
  .stat { flex: 1; background: var(--groove); padding: 1.2rem 1.5rem; }
  .stat-value { font-family: 'Bebas Neue', sans-serif; font-size: 2rem; color: var(--gold); line-height: 1; }
  .stat-label { font-family: 'DM Mono', monospace; font-size: 0.65rem; color: var(--muted); letter-spacing: 0.15em; text-transform: uppercase; margin-top: 0.3rem; }

  /* Section headers */
  .section-header {
    display: flex; align-items: center; justify-content: space-between;
    margin-bottom: 1rem; margin-top: 2.5rem;
    animation: fadeUp 0.5s 0.15s ease both;
  }
  .section-title { font-family: 'DM Mono', monospace; font-size: 0.7rem; letter-spacing: 0.2em; text-transform: uppercase; color: var(--muted); }

  /* User list */
  .user-list { display: flex; flex-direction: column; gap: 2px; animation: fadeUp 0.5s 0.2s ease both; }

  .user-row {
    background: var(--groove);
    border: 1px solid var(--border);
    border-radius: 3px;
    overflow: hidden;
    transition: border-color 0.2s;
  }
  .user-row:hover { border-color: #2a2a2a; }

  .user-header {
    padding: 0.85rem 1.2rem;
    display: grid;
    grid-template-columns: minmax(120px,1.4fr) minmax(150px,2fr) 80px 100px auto;
    align-items: center;
    gap: 1rem;
  }

  /* Name inline edit */
  .user-name-display {
    font-family: 'DM Mono', monospace;
    font-size: 0.88rem;
    color: var(--white);
    cursor: pointer;
    display: flex;
    align-items: center;
    gap: 0.4rem;
    min-width: 0;
  }
  .user-name-display span {
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
  }
  .edit-icon { color: var(--muted); font-size: 0.75rem; flex-shrink: 0; opacity: 0; transition: opacity 0.15s; }
  .user-name-display:hover .edit-icon { opacity: 1; }

  .name-edit-wrap { display: none; align-items: center; gap: 0.4rem; }
  .name-edit-wrap.active { display: flex; }
  .name-input {
    font-family: 'DM Mono', monospace;
    font-size: 0.82rem;
    background: #0d0d0d;
    border: 1px solid var(--gold);
    color: var(--white);
    padding: 0.25rem 0.5rem;
    border-radius: 2px;
    width: 130px;
    outline: none;
  }
  .name-save-btn {
    font-family: 'DM Mono', monospace; font-size: 0.65rem;
    color: #080808; background: var(--gold); border: none;
    padding: 0.28rem 0.55rem; border-radius: 2px; cursor: pointer;
    transition: background 0.15s; white-space: nowrap;
  }
  .name-save-btn:hover { background: var(--gold-light); }
  .name-cancel-btn {
    font-family: 'DM Mono', monospace; font-size: 0.65rem;
    color: var(--muted); background: none; border: 1px solid #333;
    padding: 0.28rem 0.5rem; border-radius: 2px; cursor: pointer;
  }

  .user-email {
    font-family: 'DM Mono', monospace;
    font-size: 0.72rem;
    color: var(--muted);
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
  }

  /* Tier select */
  .tier-select {
    font-family: 'DM Mono', monospace;
    font-size: 0.68rem;
    letter-spacing: 0.06em;
    text-transform: uppercase;
    background: #0d0d0d;
    border: 1px solid #2a2a2a;
    border-radius: 2px;
    color: var(--muted);
    padding: 0.28rem 0.4rem;
    cursor: pointer;
    outline: none;
    width: 80px;
    transition: border-color 0.2s, color 0.2s;
  }
  .tier-select:hover { border-color: #444; color: var(--white); }
  .tier-select.tier-pro { color: var(--gold); border-color: #3a2e10; }
  .tier-select.tier-label { color: var(--gold); border-color: var(--gold); }

  .user-joined {
    font-family: 'DM Mono', monospace;
    font-size: 0.68rem;
    color: var(--muted);
    white-space: nowrap;
  }

  /* User action buttons */
  .user-actions { display: flex; align-items: center; gap: 0.4rem; justify-content: flex-end; }

  .action-btn {
    font-family: 'DM Mono', monospace;
    font-size: 0.62rem;
    letter-spacing: 0.06em;
    color: var(--muted);
    background: none;
    border: 1px solid #222;
    padding: 0.28rem 0.55rem;
    border-radius: 2px;
    cursor: pointer;
    text-decoration: none;
    transition: color 0.2s, border-color 0.2s;
    white-space: nowrap;
  }
  .action-btn:hover { color: var(--white); border-color: #444; }
  .action-btn.danger:hover:not(:disabled) { color: var(--red); border-color: var(--red-border); }
  .action-btn:disabled { opacity: 0.4; cursor: not-allowed; }

  /* Recordings panel */
  .user-recordings {
    display: none;
    border-top: 1px solid var(--border);
    background: #0d0d0d;
  }
  .user-recordings.open { display: block; }
  .user-recordings-inner { padding: 1rem 1.2rem; display: flex; flex-direction: column; gap: 2px; }

  .recording-item {
    background: #131313;
    border: 1px solid #1a1a1a;
    border-radius: 3px;
    padding: 0.7rem 1rem;
    display: grid;
    grid-template-columns: 1fr auto;
    align-items: center;
    gap: 1rem;
    transition: border-color 0.2s;
  }
  .recording-item:hover { border-color: #2a2a2a; }

  .recording-name { font-family: 'DM Mono', monospace; font-size: 0.8rem; color: var(--white); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
  .recording-meta { font-family: 'DM Mono', monospace; font-size: 0.66rem; color: var(--muted); margin-top: 0.12rem; }

  .rec-actions { display: flex; align-items: center; gap: 0.5rem; }

  .play-btn {
    width: 30px; height: 30px; border-radius: 50%;
    background: var(--gold); border: none; cursor: pointer;
    display: flex; align-items: center; justify-content: center;
    flex-shrink: 0; transition: background 0.2s, transform 0.1s;
  }
  .play-btn:hover { background: var(--gold-light); transform: scale(1.05); }
  .play-btn svg { width: 11px; height: 11px; fill: #080808; margin-left: 2px; }

  /* Event log */
  .log-filters { display: flex; gap: 0.5rem; }
  .filter-btn {
    font-family: 'DM Mono', monospace;
    font-size: 0.65rem;
    letter-spacing: 0.1em;
    text-transform: uppercase;
    color: var(--muted);
    background: none;
    border: 1px solid #222;
    padding: 0.3rem 0.7rem;
    border-radius: 2px;
    cursor: pointer;
    transition: color 0.2s, border-color 0.2s;
  }
  .filter-btn.active, .filter-btn:hover { color: var(--gold); border-color: var(--gold); }

  .log-table-wrap {
    border: 1px solid var(--border);
    border-radius: 3px;
    overflow: hidden;
    animation: fadeUp 0.5s 0.25s ease both;
  }

  .log-table { width: 100%; border-collapse: collapse; }
  .log-table th {
    font-family: 'DM Mono', monospace; font-size: 0.62rem;
    letter-spacing: 0.15em; text-transform: uppercase;
    color: var(--muted); background: var(--groove);
    padding: 0.7rem 1rem; text-align: left;
    border-bottom: 1px solid var(--border);
  }
  .log-table td {
    font-family: 'DM Mono', monospace; font-size: 0.72rem;
    color: var(--white); padding: 0.65rem 1rem;
    border-bottom: 1px solid #141414; vertical-align: top;
  }
  .log-table tr:last-child td { border-bottom: none; }
  .log-table tr:hover td { background: #0d0d0d; }

  .event-type {
    display: inline-block; padding: 0.15rem 0.4rem;
    border-radius: 2px; font-size: 0.62rem;
    letter-spacing: 0.08em; text-transform: uppercase;
  }
  .event-type.recording_started  { background: #1a2a1a; color: #4caf70; }
  .event-type.recording_complete { background: #1a2a1a; color: #4caf70; }
  .event-type.upload_complete    { background: #1a2a1a; color: #4caf70; }
  .event-type.stream_detected    { background: #1a1a2a; color: #7090e0; }
  .event-type.download           { background: #1a1a2a; color: #7090e0; }
  .event-type.login              { background: #222; color: var(--muted); }
  .event-type.delete             { background: #2a1a1a; color: var(--red); }
  .event-type.signup             { background: #2a2a10; color: var(--gold); }

  .log-detail { color: var(--muted); font-size: 0.68rem; }

  .refresh-label {
    font-family: 'DM Mono', monospace; font-size: 0.62rem;
    color: var(--muted); letter-spacing: 0.08em;
  }

  /* Now playing bar */
  #now-playing {
    position: fixed; bottom: 0; left: 0; right: 0;
    background: #0d0d0d; border-top: 1px solid var(--border);
    padding: 1rem 2.5rem; display: none; align-items: center; gap: 1.5rem;
    z-index: 50; animation: slideUp 0.3s ease;
  }
  @keyframes slideUp { from { transform: translateY(100%); } to { transform: translateY(0); } }
  #now-playing.visible { display: flex; }
  .np-info { flex: 1; min-width: 0; }
  .np-label { font-family: 'DM Mono', monospace; font-size: 0.6rem; color: var(--gold); letter-spacing: 0.2em; text-transform: uppercase; }
  .np-name  { font-family: 'DM Mono', monospace; font-size: 0.85rem; color: var(--white); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
  .stop-btn { font-family: 'DM Mono', monospace; font-size: 0.68rem; color: var(--muted); background: none; border: none; cursor: pointer; transition: color 0.2s; }
  .stop-btn:hover { color: var(--white); }
  audio#player { display: none; }

  /* Loading / empty */
  .loading { text-align: center; padding: 2.5rem; font-family: 'DM Mono', monospace; font-size: 0.75rem; color: var(--muted); letter-spacing: 0.1em; }
  .spinner { width: 20px; height: 20px; border: 2px solid #222; border-top-color: var(--gold); border-radius: 50%; animation: spin 0.7s linear infinite; margin: 0 auto 0.8rem; }
  @keyframes spin { to { transform: rotate(360deg); } }
  .empty-log { text-align: center; padding: 2rem; font-family: 'DM Mono', monospace; font-size: 0.72rem; color: #2a2a2a; letter-spacing: 0.1em; }

  /* Toast */
  #toast {
    position: fixed; bottom: 5rem; left: 50%; transform: translateX(-50%);
    background: #1a1a1a; border: 1px solid #333; border-radius: 3px;
    font-family: 'DM Mono', monospace; font-size: 0.72rem; color: var(--white);
    padding: 0.65rem 1.2rem; opacity: 0; transition: opacity 0.2s;
    pointer-events: none; z-index: 200; white-space: nowrap;
  }
  #toast.show { opacity: 1; }
</style>
</head>
<body>

<nav>
  <a class="logo" href="index.html">WAX<span>I</span><span class="admin-badge">ADMIN</span></a>
  <div style="display:flex;align-items:center;gap:0.25rem">
    <a href="dashboard.html" class="nav-link">Dashboard</a>
    <a href="pricing.html" class="nav-link">Pricing</a>
  </div>
  <div class="nav-right">
    <div class="dj-name" id="nav-dj-name">—</div>
    <button class="logout-btn" onclick="logout()">Log Out</button>
  </div>
</nav>

<main>
  <div class="page-header">
    <div class="page-title">CONTROL ROOM</div>
    <div class="page-subtitle" id="page-subtitle">Loading platform data...</div>
  </div>

  <div class="stats" id="stats" style="display:none">
    <div class="stat">
      <div class="stat-value" id="stat-users">0</div>
      <div class="stat-label">Users</div>
    </div>
    <div class="stat">
      <div class="stat-value" id="stat-recordings">0</div>
      <div class="stat-label">Recordings</div>
    </div>
    <div class="stat">
      <div class="stat-value" id="stat-size">—</div>
      <div class="stat-label">Total Storage</div>
    </div>
  </div>

  <!-- Users section -->
  <div class="section-header">
    <div class="section-title">All Users</div>
  </div>
  <div id="user-list-container">
    <div class="loading"><div class="spinner"></div>Loading users...</div>
  </div>

  <!-- Event log section -->
  <div class="section-header" style="margin-top:3rem">
    <div class="section-title">Event Log</div>
    <div style="display:flex;align-items:center;gap:1rem">
      <span class="refresh-label" id="refresh-label">—</span>
      <div class="log-filters">
        <button class="filter-btn active" onclick="setFilter('all', this)">All</button>
        <button class="filter-btn" onclick="setFilter('recording', this)">Recording</button>
        <button class="filter-btn" onclick="setFilter('user', this)">User</button>
      </div>
    </div>
  </div>
  <div class="log-table-wrap">
    <div id="log-container">
      <div class="loading"><div class="spinner"></div>Loading events...</div>
    </div>
  </div>
</main>

<div id="now-playing">
  <div class="np-info">
    <div class="np-label">▶ Now Playing</div>
    <div class="np-name" id="np-name">—</div>
  </div>
  <div style="display:flex;align-items:center;gap:1rem">
    <button class="stop-btn" onclick="stopAudio()">◼ Stop</button>
  </div>
</div>

<audio id="player"></audio>
<div id="toast"></div>

<script>
  const { createClient } = supabase;
  const sb = createClient(
    'https://axhhkmobmvkznmkiplso.supabase.co',
    'sb_publishable_f0T6tAUq16w1d9s4Dssv-Q_y4OMLaYx'
  );

  const SUPABASE_URL  = 'https://axhhkmobmvkznmkiplso.supabase.co';
  const PLAYER_BASE   = 'https://waxi-theta.vercel.app/player.html';

  let currentUser  = null;
  let currentAudio = null;
  let currentBtn   = null;
  let activeFilter = 'all';
  let refreshTimer = null;
  const player     = document.getElementById('player');

  const RECORDING_TYPES = new Set(['stream_detected', 'recording_started', 'recording_complete', 'upload_complete']);
  const USER_TYPES      = new Set(['login', 'signup', 'download', 'delete']);

  async function init() {
    const { data: { session } } = await sb.auth.getSession();
    if (!session) { window.location.href = 'index.html'; return; }

    const { data: adminRow } = await sb
      .from('admin_users')
      .select('user_id')
      .eq('user_id', session.user.id)
      .maybeSingle();

    if (!adminRow) { window.location.href = 'dashboard.html'; return; }

    currentUser = session.user;
    const djName = session.user.user_metadata?.dj_name || session.user.email;
    document.getElementById('nav-dj-name').textContent = djName;

    await Promise.all([loadAllUsers(), loadEventLogs()]);
    refreshTimer = setInterval(loadEventLogs, 30000);
  }

  // ── Users ─────────────────────────────────────────────────

  async function loadAllUsers() {
    const { data: users, error } = await sb
      .from('dj_profiles')
      .select('*')
      .order('created_at', { ascending: false });

    const container = document.getElementById('user-list-container');

    if (error) {
      container.innerHTML = `<div class="empty-log">Could not load users: ${escHtml(error.message)}</div>`;
      return;
    }

    if (!users || users.length === 0) {
      container.innerHTML = '<div class="empty-log">No registered users yet.</div>';
      document.getElementById('stat-users').textContent = '0';
      document.getElementById('stats').style.display = 'flex';
      return;
    }

    document.getElementById('stat-users').textContent = users.length;
    document.getElementById('page-subtitle').textContent =
      `${users.length} registered user${users.length !== 1 ? 's' : ''}`;
    document.getElementById('stats').style.display = 'flex';

    container.innerHTML = '';
    const list = document.createElement('div');
    list.className = 'user-list';

    for (const user of users) {
      const row = buildUserRow(user);
      list.appendChild(row);
    }

    container.appendChild(list);
  }

  function buildUserRow(user) {
    const row = document.createElement('div');
    row.className = 'user-row';
    row.dataset.userId = user.id;

    const tier     = user.tier || 'free';
    const joined   = user.created_at ? formatDate(user.created_at) : '—';
    const email    = user.email || '—';
    const djName   = user.dj_name || '—';

    row.innerHTML = `
      <div class="user-header">
        <!-- Name (click to edit) -->
        <div>
          <div class="user-name-display" onclick="startNameEdit(this)" title="Click to edit">
            <span>${escHtml(djName)}</span>
            <span class="edit-icon">✎</span>
          </div>
          <div class="name-edit-wrap">
            <input class="name-input" type="text" value="${escHtml(djName)}" />
            <button class="name-save-btn" onclick="saveName(this)">Save</button>
            <button class="name-cancel-btn" onclick="cancelNameEdit(this)">✕</button>
          </div>
        </div>

        <!-- Email -->
        <div class="user-email" title="${escHtml(email)}">${escHtml(email)}</div>

        <!-- Tier select -->
        <select class="tier-select tier-${tier}"
          onchange="saveTier(this, '${escHtml(user.id)}')">
          <option value="free"  ${tier === 'free'  ? 'selected' : ''}>Free</option>
          <option value="pro"   ${tier === 'pro'   ? 'selected' : ''}>Pro</option>
          <option value="label" ${tier === 'label' ? 'selected' : ''}>Label</option>
        </select>

        <!-- Join date -->
        <div class="user-joined">${joined}</div>

        <!-- Actions -->
        <div class="user-actions">
          <button class="action-btn" onclick="toggleRecordings(this, '${escHtml(user.dj_name || '')}')">▶ View</button>
          <button class="action-btn" onclick="resetPassword(this, '${escHtml(email)}')">Reset PW</button>
          <button class="action-btn danger" onclick="deleteUser(this, '${escHtml(user.id)}', '${escHtml(djName)}')">Delete</button>
        </div>
      </div>

      <!-- Recordings panel (lazy-loaded) -->
      <div class="user-recordings" id="recs-${escHtml(user.id)}">
        <div class="user-recordings-inner" id="recs-inner-${escHtml(user.id)}">
          <div class="loading"><div class="spinner"></div>Loading recordings...</div>
        </div>
      </div>
    `;

    return row;
  }

  // ── Name edit ─────────────────────────────────────────────

  function startNameEdit(displayEl) {
    const wrap = displayEl.nextElementSibling;
    displayEl.style.display = 'none';
    wrap.classList.add('active');
    wrap.querySelector('.name-input').focus();
    wrap.querySelector('.name-input').select();
  }

  function cancelNameEdit(btn) {
    const wrap = btn.closest('.name-edit-wrap');
    const displayEl = wrap.previousElementSibling;
    wrap.classList.remove('active');
    displayEl.style.display = '';
  }

  async function saveName(btn) {
    const wrap      = btn.closest('.name-edit-wrap');
    const row       = wrap.closest('.user-row');
    const userId    = row.dataset.userId;
    const input     = wrap.querySelector('.name-input');
    const newName   = input.value.trim();
    const displayEl = wrap.previousElementSibling;

    if (!newName) { input.focus(); return; }

    btn.disabled    = true;
    btn.textContent = '...';

    // Check uniqueness (exclude current user)
    const { data: existing } = await sb
      .from('dj_profiles')
      .select('id')
      .eq('dj_name', newName)
      .neq('id', userId)
      .maybeSingle();

    if (existing) {
      showToast('DJ name already taken');
      btn.disabled    = false;
      btn.textContent = 'Save';
      return;
    }

    const { error } = await sb
      .from('dj_profiles')
      .update({ dj_name: newName })
      .eq('id', userId);

    if (error) {
      showToast('Failed to save: ' + error.message);
      btn.disabled    = false;
      btn.textContent = 'Save';
      return;
    }

    // Update display
    displayEl.querySelector('span').textContent = newName;
    wrap.classList.remove('active');
    displayEl.style.display = '';
    btn.disabled    = false;
    btn.textContent = 'Save';
    showToast('Name updated');
  }

  // ── Tier ──────────────────────────────────────────────────

  async function saveTier(select, userId) {
    const tier = select.value;
    select.disabled = true;

    const { error } = await sb
      .from('dj_profiles')
      .update({ tier })
      .eq('id', userId);

    select.disabled = false;
    select.className = `tier-select tier-${tier}`;

    if (error) {
      showToast('Failed to save tier: ' + error.message);
    } else {
      showToast(`Tier set to ${tier}`);
    }
  }

  // ── Reset password ─────────────────────────────────────────

  async function resetPassword(btn, email) {
    if (email === '—' || !email) { showToast('No email on file'); return; }
    if (!confirm(`Send password reset email to ${email}?`)) return;

    btn.disabled    = true;
    btn.textContent = '...';

    const { error } = await sb.auth.resetPasswordForEmail(email, {
      redirectTo: window.location.origin + '/index.html'
    });

    btn.disabled    = false;
    btn.textContent = 'Reset PW';

    if (error) {
      showToast('Error: ' + error.message);
    } else {
      showToast('Reset email sent to ' + email);
    }
  }

  // ── Delete user ────────────────────────────────────────────

  async function deleteUser(btn, userId, djName) {
    if (!confirm(`Permanently delete user "${djName}"?\nThis removes their account. Recordings in storage are NOT deleted (clean up manually).`)) return;

    btn.disabled    = true;
    btn.textContent = 'Deleting...';

    const { error } = await sb.functions.invoke('admin-delete-user', {
      body: { userId }
    });

    if (error) {
      btn.disabled    = false;
      btn.textContent = 'Delete';
      showToast('Delete failed: ' + error.message);
      return;
    }

    const row = btn.closest('.user-row');
    row.style.transition = 'opacity 0.3s, transform 0.3s';
    row.style.opacity    = '0';
    row.style.transform  = 'translateX(-10px)';
    setTimeout(() => {
      row.remove();
      const count = document.querySelectorAll('.user-row').length;
      document.getElementById('stat-users').textContent = count;
    }, 300);
    showToast(`${djName} deleted`);
  }

  // ── Recordings (lazy) ─────────────────────────────────────

  async function toggleRecordings(btn, djName) {
    const row       = btn.closest('.user-row');
    const userId    = row.dataset.userId;
    const panel     = document.getElementById(`recs-${userId}`);
    const inner     = document.getElementById(`recs-inner-${userId}`);
    const isOpen    = panel.classList.toggle('open');

    btn.textContent = isOpen ? '▼ Hide' : '▶ View';

    if (!isOpen || panel.dataset.loaded) return;
    panel.dataset.loaded = '1';

    if (!djName) {
      inner.innerHTML = '<div class="empty-log">No DJ name set — no recordings folder.</div>';
      return;
    }

    const { data: files, error } = await sb.storage
      .from('recordings')
      .list(djName, { sortBy: { column: 'created_at', order: 'desc' } });

    if (error) {
      inner.innerHTML = `<div class="empty-log">Error: ${escHtml(error.message)}</div>`;
      return;
    }

    const mp3s = (files || []).filter(f => f.name.endsWith('.mp3'));

    if (mp3s.length === 0) {
      inner.innerHTML = '<div class="empty-log">No recordings yet.</div>';
      // Still update storage stats
      return;
    }

    inner.innerHTML = '';

    // Tally storage for stat bar
    let totalBytes = 0;
    let totalRecs  = 0;

    for (const file of mp3s) {
      const { data: urlData } = await sb.storage
        .from('recordings')
        .createSignedUrl(`${djName}/${file.name}`, 3600);
      const url  = urlData?.signedUrl || '#';
      const size = formatBytes(file.metadata?.size || 0);
      const date = formatDate(file.created_at);
      const id   = 'ap-' + Math.random().toString(36).slice(2);
      const shareUrl = `${PLAYER_BASE}?dj=${encodeURIComponent(djName)}&file=${encodeURIComponent(file.name)}`;

      totalBytes += file.metadata?.size || 0;
      totalRecs++;

      const item = document.createElement('div');
      item.className = 'recording-item';
      item.dataset.size     = file.metadata?.size || 0;
      item.dataset.djname   = djName;
      item.dataset.filename = file.name;
      item.innerHTML = `
        <div>
          <div class="recording-name">${escHtml(file.name.replace('.mp3', ''))}</div>
          <div class="recording-meta">${date} · ${size}</div>
        </div>
        <div class="rec-actions">
          <button class="play-btn" id="${id}" onclick="togglePlay('${escHtml(url)}', '${escHtml(file.name)}', '${id}')">
            <svg viewBox="0 0 24 24"><path d="M8 5v14l11-7z"/></svg>
          </button>
          <a class="action-btn" href="${escHtml(url)}" download="${escHtml(file.name)}">↓ Download</a>
          <button class="action-btn" onclick="shareRecording(this, '${escHtml(shareUrl)}')">⬡ Share</button>
          <button class="action-btn danger" onclick="deleteRecording(this)">✕ Delete</button>
        </div>
      `;
      inner.appendChild(item);
    }

    // Update global stats
    updateGlobalStats();
  }

  function updateGlobalStats() {
    const allItems  = document.querySelectorAll('.recording-item');
    const totalRec  = allItems.length;
    const totalSize = Array.from(allItems).reduce((acc, el) => acc + parseInt(el.dataset.size || 0, 10), 0);
    if (totalRec > 0) {
      document.getElementById('stat-recordings').textContent = totalRec;
      document.getElementById('stat-size').textContent       = formatBytes(totalSize);
    }
  }

  // ── Recording actions ──────────────────────────────────────

  async function deleteRecording(btn) {
    const item     = btn.closest('.recording-item');
    const djName   = item.dataset.djname;
    const fileName = item.dataset.filename;

    if (!confirm(`Delete "${fileName.replace('.mp3', '')}" from ${djName}?\nThis cannot be undone.`)) return;

    btn.disabled    = true;
    btn.textContent = '...';

    const playBtn = item.querySelector('.play-btn');
    if (currentBtn === playBtn) stopAudio();

    const { error } = await sb.storage
      .from('recordings')
      .remove([`${djName}/${fileName}`]);

    if (error) {
      btn.disabled    = false;
      btn.textContent = '✕ Delete';
      showToast('Delete failed: ' + error.message);
      return;
    }

    item.style.transition = 'opacity 0.3s, transform 0.3s';
    item.style.opacity    = '0';
    item.style.transform  = 'translateX(-10px)';
    setTimeout(() => { item.remove(); updateGlobalStats(); }, 300);
  }

  function shareRecording(btn, shareUrl) {
    navigator.clipboard.writeText(shareUrl).then(() => {
      const orig = btn.textContent;
      btn.textContent = '✓ Copied!';
      setTimeout(() => { btn.textContent = orig; }, 2000);
    }).catch(() => {
      showToast('Could not copy — try manually: ' + shareUrl);
    });
  }

  // ── Audio ─────────────────────────────────────────────────

  function togglePlay(url, name, btnId) {
    const btn = document.getElementById(btnId);
    if (currentAudio === url && !player.paused) {
      player.pause();
      setPlayIcon(btn, false);
      document.getElementById('now-playing').classList.remove('visible');
      currentAudio = null; currentBtn = null; return;
    }
    if (currentBtn) setPlayIcon(currentBtn, false);
    player.src = url; player.play();
    currentAudio = url; currentBtn = btn;
    setPlayIcon(btn, true);
    document.getElementById('np-name').textContent = name.replace('.mp3', '');
    document.getElementById('now-playing').classList.add('visible');
  }

  function setPlayIcon(btn, playing) {
    btn.innerHTML = playing
      ? `<svg viewBox="0 0 24 24"><path d="M6 19h4V5H6v14zm8-14v14h4V5h-4z"/></svg>`
      : `<svg viewBox="0 0 24 24"><path d="M8 5v14l11-7z"/></svg>`;
  }

  function stopAudio() {
    player.pause(); player.src = '';
    if (currentBtn) setPlayIcon(currentBtn, false);
    document.getElementById('now-playing').classList.remove('visible');
    currentAudio = null; currentBtn = null;
  }

  player.addEventListener('ended', () => {
    if (currentBtn) setPlayIcon(currentBtn, false);
    document.getElementById('now-playing').classList.remove('visible');
    currentAudio = null; currentBtn = null;
  });

  // ── Event log ─────────────────────────────────────────────

  function setFilter(filter, btn) {
    activeFilter = filter;
    document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
    loadEventLogs();
  }

  async function loadEventLogs() {
    const container = document.getElementById('log-container');

    let query = sb.from('event_logs')
      .select('*')
      .order('created_at', { ascending: false })
      .limit(150);

    if (activeFilter === 'recording') {
      query = query.in('event_type', [...RECORDING_TYPES]);
    } else if (activeFilter === 'user') {
      query = query.in('event_type', [...USER_TYPES]);
    }

    const { data: events, error } = await query;
    const now = new Date();
    document.getElementById('refresh-label').textContent =
      'Updated ' + now.toLocaleTimeString('en-US', { hour: '2-digit', minute: '2-digit' });

    if (error) {
      container.innerHTML = `<div class="empty-log">Could not load events: ${escHtml(error.message)}</div>`;
      return;
    }

    if (!events || events.length === 0) {
      container.innerHTML = '<div class="empty-log">No events yet.</div>';
      return;
    }

    const rows = events.map(e => {
      const type    = e.event_type || 'unknown';
      const details = e.details ? JSON.stringify(e.details).replace(/[{}"]/g, '').replace(/,/g, ' · ') : '';
      const time    = new Date(e.created_at).toLocaleString('en-US', {
        month: 'short', day: 'numeric',
        hour: '2-digit', minute: '2-digit', second: '2-digit'
      });
      return `
        <tr>
          <td style="white-space:nowrap;color:var(--muted)">${time}</td>
          <td><span class="event-type ${type}">${type.replace(/_/g, ' ')}</span></td>
          <td style="color:var(--gold)">${escHtml(e.dj_name || '—')}</td>
          <td class="log-detail">${escHtml(details)}</td>
        </tr>`;
    }).join('');

    container.innerHTML = `
      <table class="log-table">
        <thead>
          <tr>
            <th>Time</th><th>Event</th><th>DJ</th><th>Details</th>
          </tr>
        </thead>
        <tbody>${rows}</tbody>
      </table>`;
  }

  // ── Auth ──────────────────────────────────────────────────

  async function logout() {
    clearInterval(refreshTimer);
    await sb.auth.signOut();
    window.location.href = 'index.html';
  }

  // ── Toast ─────────────────────────────────────────────────

  let toastTimer = null;
  function showToast(msg) {
    const t = document.getElementById('toast');
    t.textContent = msg;
    t.classList.add('show');
    clearTimeout(toastTimer);
    toastTimer = setTimeout(() => t.classList.remove('show'), 2500);
  }

  // ── Helpers ───────────────────────────────────────────────

  function formatBytes(bytes) {
    if (!bytes) return '—';
    if (bytes < 1048576) return (bytes / 1024).toFixed(1) + ' KB';
    if (bytes < 1073741824) return (bytes / 1048576).toFixed(1) + ' MB';
    return (bytes / 1073741824).toFixed(1) + ' GB';
  }

  function formatDate(str) {
    if (!str) return '—';
    return new Date(str).toLocaleDateString('en-US', { month: 'short', day: 'numeric', year: 'numeric' });
  }

  function escHtml(str) {
    return String(str)
      .replace(/&/g, '&amp;')
      .replace(/</g, '&lt;')
      .replace(/>/g, '&gt;')
      .replace(/"/g, '&quot;')
      .replace(/'/g, '&#39;');
  }

  init();
</script>
</body>
</html>
