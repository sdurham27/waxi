<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Waxi — Admin</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Mono:wght@400;500&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<style>
  :root {
    --black: #080808;
    --white: #f0ede6;
    --gold: #c9a84c;
    --gold-light: #e2c47a;
    --groove: #111;
    --border: #1e1e1e;
    --muted: #555;
    --red: #e05555;
    --red-border: #5a2020;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    background: var(--black);
    color: var(--white);
    font-family: 'DM Sans', sans-serif;
    min-height: 100vh;
  }

  body::after {
    content: '';
    position: fixed;
    inset: 0;
    background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noise'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noise)' opacity='0.04'/%3E%3C/svg%3E");
    pointer-events: none;
    z-index: 100;
    opacity: 0.3;
  }

  /* Nav */
  nav {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 1.2rem 2.5rem;
    border-bottom: 1px solid var(--border);
    position: sticky;
    top: 0;
    background: rgba(8,8,8,0.95);
    backdrop-filter: blur(10px);
    z-index: 50;
  }

  .logo { font-family: 'Bebas Neue', sans-serif; font-size: 2rem; letter-spacing: 0.08em; }
  .logo span { color: var(--gold); }

  .admin-badge {
    font-family: 'DM Mono', monospace;
    font-size: 0.6rem;
    letter-spacing: 0.2em;
    background: var(--gold);
    color: #080808;
    padding: 0.2rem 0.5rem;
    border-radius: 2px;
    margin-left: 0.8rem;
    vertical-align: middle;
  }

  .nav-right { display: flex; align-items: center; gap: 1.5rem; }

  .dj-name {
    font-family: 'DM Mono', monospace;
    font-size: 0.75rem;
    color: var(--muted);
    letter-spacing: 0.1em;
  }

  .logout-btn {
    font-family: 'DM Mono', monospace;
    font-size: 0.7rem;
    letter-spacing: 0.1em;
    text-transform: uppercase;
    color: var(--muted);
    background: none;
    border: 1px solid #222;
    padding: 0.4rem 0.9rem;
    border-radius: 2px;
    cursor: pointer;
    transition: color 0.2s, border-color 0.2s;
  }
  .logout-btn:hover { color: var(--white); border-color: #444; }

  .nav-link {
    font-family: 'DM Mono', monospace;
    font-size: 0.7rem;
    letter-spacing: 0.1em;
    text-transform: uppercase;
    color: var(--muted);
    text-decoration: none;
    padding: 0.4rem 0.9rem;
    border-radius: 2px;
    transition: color 0.2s;
  }
  .nav-link:hover { color: var(--white); }

  /* Main */
  main { max-width: 1000px; margin: 0 auto; padding: 3rem 2rem; }

  .page-header { margin-bottom: 2.5rem; animation: fadeUp 0.5s ease both; }
  .page-title { font-family: 'Bebas Neue', sans-serif; font-size: 3.5rem; letter-spacing: 0.05em; line-height: 1; }
  .page-subtitle { font-family: 'DM Mono', monospace; font-size: 0.72rem; color: var(--muted); letter-spacing: 0.15em; text-transform: uppercase; margin-top: 0.5rem; }

  @keyframes fadeUp {
    from { opacity: 0; transform: translateY(12px); }
    to   { opacity: 1; transform: translateY(0); }
  }

  /* Stats bar */
  .stats {
    display: flex; gap: 1px; margin-bottom: 2.5rem;
    background: var(--border); border: 1px solid var(--border);
    border-radius: 4px; overflow: hidden;
    animation: fadeUp 0.5s 0.1s ease both;
  }
  .stat { flex: 1; background: var(--groove); padding: 1.2rem 1.5rem; }
  .stat-value { font-family: 'Bebas Neue', sans-serif; font-size: 2rem; color: var(--gold); line-height: 1; }
  .stat-label { font-family: 'DM Mono', monospace; font-size: 0.65rem; color: var(--muted); letter-spacing: 0.15em; text-transform: uppercase; margin-top: 0.3rem; }

  /* Section headers */
  .section-header {
    display: flex; align-items: center; justify-content: space-between;
    margin-bottom: 1rem; margin-top: 2.5rem;
    animation: fadeUp 0.5s 0.15s ease both;
  }
  .section-title { font-family: 'DM Mono', monospace; font-size: 0.7rem; letter-spacing: 0.2em; text-transform: uppercase; color: var(--muted); }

  /* DJ list */
  .dj-list { display: flex; flex-direction: column; gap: 2px; animation: fadeUp 0.5s 0.2s ease both; }

  .dj-row {
    background: var(--groove);
    border: 1px solid var(--border);
    border-radius: 3px;
    overflow: hidden;
    transition: border-color 0.2s;
  }
  .dj-row:hover { border-color: #2a2a2a; }

  .dj-header {
    padding: 1rem 1.5rem;
    display: grid;
    grid-template-columns: 1fr auto auto auto auto;
    align-items: center;
    gap: 1.5rem;
    cursor: pointer;
    user-select: none;
  }

  .dj-name-big { font-family: 'DM Mono', monospace; font-size: 0.9rem; color: var(--white); }
  .dj-meta { font-family: 'DM Mono', monospace; font-size: 0.7rem; color: var(--muted); }

  .expand-btn {
    font-family: 'DM Mono', monospace;
    font-size: 0.68rem;
    color: var(--muted);
    background: none;
    border: 1px solid #222;
    padding: 0.3rem 0.6rem;
    border-radius: 2px;
    cursor: pointer;
    transition: color 0.2s, border-color 0.2s;
  }
  .expand-btn:hover { color: var(--white); border-color: #444; }

  /* DJ recordings panel */
  .dj-recordings {
    display: none;
    border-top: 1px solid var(--border);
    background: #0d0d0d;
  }
  .dj-recordings.open { display: block; }

  .dj-recordings-inner { padding: 1rem 1.5rem; display: flex; flex-direction: column; gap: 2px; }

  .recording-item {
    background: #131313;
    border: 1px solid #1a1a1a;
    border-radius: 3px;
    padding: 0.8rem 1.2rem;
    display: grid;
    grid-template-columns: 1fr auto;
    align-items: center;
    gap: 1rem;
    transition: border-color 0.2s;
  }
  .recording-item:hover { border-color: #2a2a2a; }

  .recording-name { font-family: 'DM Mono', monospace; font-size: 0.82rem; color: var(--white); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
  .recording-meta { font-family: 'DM Mono', monospace; font-size: 0.68rem; color: var(--muted); margin-top: 0.15rem; }

  .player-wrap { display: flex; align-items: center; gap: 0.6rem; }

  .play-btn {
    width: 32px; height: 32px; border-radius: 50%;
    background: var(--gold); border: none; cursor: pointer;
    display: flex; align-items: center; justify-content: center;
    flex-shrink: 0; transition: background 0.2s, transform 0.1s;
  }
  .play-btn:hover { background: var(--gold-light); transform: scale(1.05); }
  .play-btn svg { width: 12px; height: 12px; fill: #080808; margin-left: 2px; }

  .action-btn {
    font-family: 'DM Mono', monospace;
    font-size: 0.65rem;
    letter-spacing: 0.08em;
    color: var(--muted);
    background: none;
    border: 1px solid #222;
    padding: 0.3rem 0.6rem;
    border-radius: 2px;
    cursor: pointer;
    text-decoration: none;
    transition: color 0.2s, border-color 0.2s;
    white-space: nowrap;
  }
  .action-btn:hover { color: var(--white); border-color: #444; }
  .action-btn.danger:hover:not(:disabled) { color: var(--red); border-color: var(--red-border); }
  .action-btn:disabled { opacity: 0.4; cursor: not-allowed; }

  /* Event log */
  .log-filters { display: flex; gap: 0.5rem; }
  .filter-btn {
    font-family: 'DM Mono', monospace;
    font-size: 0.65rem;
    letter-spacing: 0.1em;
    text-transform: uppercase;
    color: var(--muted);
    background: none;
    border: 1px solid #222;
    padding: 0.3rem 0.7rem;
    border-radius: 2px;
    cursor: pointer;
    transition: color 0.2s, border-color 0.2s;
  }
  .filter-btn.active, .filter-btn:hover { color: var(--gold); border-color: var(--gold); }

  .log-table-wrap {
    border: 1px solid var(--border);
    border-radius: 3px;
    overflow: hidden;
    animation: fadeUp 0.5s 0.25s ease both;
  }

  .log-table { width: 100%; border-collapse: collapse; }

  .log-table th {
    font-family: 'DM Mono', monospace;
    font-size: 0.62rem;
    letter-spacing: 0.15em;
    text-transform: uppercase;
    color: var(--muted);
    background: var(--groove);
    padding: 0.7rem 1rem;
    text-align: left;
    border-bottom: 1px solid var(--border);
  }

  .log-table td {
    font-family: 'DM Mono', monospace;
    font-size: 0.72rem;
    color: var(--white);
    padding: 0.65rem 1rem;
    border-bottom: 1px solid #141414;
    vertical-align: top;
  }

  .log-table tr:last-child td { border-bottom: none; }
  .log-table tr:hover td { background: #0d0d0d; }

  .event-type {
    display: inline-block;
    padding: 0.15rem 0.4rem;
    border-radius: 2px;
    font-size: 0.62rem;
    letter-spacing: 0.08em;
    text-transform: uppercase;
  }
  .event-type.recording_started  { background: #1a2a1a; color: #4caf70; }
  .event-type.recording_complete { background: #1a2a1a; color: #4caf70; }
  .event-type.upload_complete    { background: #1a2a1a; color: #4caf70; }
  .event-type.stream_detected    { background: #1a1a2a; color: #7090e0; }
  .event-type.download           { background: #1a1a2a; color: #7090e0; }
  .event-type.login              { background: #222; color: var(--muted); }
  .event-type.delete             { background: #2a1a1a; color: var(--red); }
  .event-type.signup             { background: #2a2a10; color: var(--gold); }

  .log-detail { color: var(--muted); font-size: 0.68rem; }

  .refresh-label {
    font-family: 'DM Mono', monospace;
    font-size: 0.62rem;
    color: var(--muted);
    letter-spacing: 0.08em;
  }

  /* Now playing bar */
  #now-playing {
    position: fixed; bottom: 0; left: 0; right: 0;
    background: #0d0d0d; border-top: 1px solid var(--border);
    padding: 1rem 2.5rem; display: none; align-items: center; gap: 1.5rem;
    z-index: 50; animation: slideUp 0.3s ease;
  }
  @keyframes slideUp { from { transform: translateY(100%); } to { transform: translateY(0); } }
  #now-playing.visible { display: flex; }
  .np-info { flex: 1; min-width: 0; }
  .np-label { font-family: 'DM Mono', monospace; font-size: 0.6rem; color: var(--gold); letter-spacing: 0.2em; text-transform: uppercase; }
  .np-name  { font-family: 'DM Mono', monospace; font-size: 0.85rem; color: var(--white); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
  .stop-btn { font-family: 'DM Mono', monospace; font-size: 0.68rem; color: var(--muted); background: none; border: none; cursor: pointer; transition: color 0.2s; }
  .stop-btn:hover { color: var(--white); }
  audio#player { display: none; }

  /* Loading / empty */
  .loading { text-align: center; padding: 2.5rem; font-family: 'DM Mono', monospace; font-size: 0.75rem; color: var(--muted); letter-spacing: 0.1em; }
  .spinner { width: 20px; height: 20px; border: 2px solid #222; border-top-color: var(--gold); border-radius: 50%; animation: spin 0.7s linear infinite; margin: 0 auto 0.8rem; }
  @keyframes spin { to { transform: rotate(360deg); } }

  .empty-log { text-align: center; padding: 2rem; font-family: 'DM Mono', monospace; font-size: 0.72rem; color: #2a2a2a; letter-spacing: 0.1em; }
</style>
</head>
<body>

<nav>
  <a class="logo" href="index.html" style="text-decoration:none;color:inherit">WAX<span>I</span><span class="admin-badge">ADMIN</span></a>
  <div style="display:flex;align-items:center;gap:0.25rem">
    <a href="dashboard.html" class="nav-link">Dashboard</a>
    <a href="pricing.html" class="nav-link">Pricing</a>
  </div>
  <div class="nav-right">
    <div class="dj-name" id="nav-dj-name">—</div>
    <button class="logout-btn" onclick="logout()">Log Out</button>
  </div>
</nav>

<main>
  <div class="page-header">
    <div class="page-title">CONTROL ROOM</div>
    <div class="page-subtitle" id="page-subtitle">Loading platform data...</div>
  </div>

  <div class="stats" id="stats" style="display:none">
    <div class="stat">
      <div class="stat-value" id="stat-djs">0</div>
      <div class="stat-label">DJs</div>
    </div>
    <div class="stat">
      <div class="stat-value" id="stat-recordings">0</div>
      <div class="stat-label">Recordings</div>
    </div>
    <div class="stat">
      <div class="stat-value" id="stat-size">0 MB</div>
      <div class="stat-label">Total Storage</div>
    </div>
  </div>

  <!-- DJs section -->
  <div class="section-header">
    <div class="section-title">All DJs</div>
  </div>
  <div id="dj-list-container">
    <div class="loading"><div class="spinner"></div>Loading DJs...</div>
  </div>

  <!-- Event log section -->
  <div class="section-header" style="margin-top:3rem">
    <div class="section-title">Event Log</div>
    <div style="display:flex;align-items:center;gap:1rem">
      <span class="refresh-label" id="refresh-label">—</span>
      <div class="log-filters">
        <button class="filter-btn active" onclick="setFilter('all', this)">All</button>
        <button class="filter-btn" onclick="setFilter('recording', this)">Recording</button>
        <button class="filter-btn" onclick="setFilter('user', this)">User</button>
      </div>
    </div>
  </div>
  <div class="log-table-wrap">
    <div id="log-container">
      <div class="loading"><div class="spinner"></div>Loading events...</div>
    </div>
  </div>
</main>

<div id="now-playing">
  <div class="np-info">
    <div class="np-label">▶ Now Playing</div>
    <div class="np-name" id="np-name">—</div>
  </div>
  <div style="display:flex;align-items:center;gap:1rem">
    <button class="stop-btn" onclick="stopAudio()">◼ Stop</button>
  </div>
</div>

<audio id="player"></audio>

<script>
  const ADMIN_DJ = 'saintdizzie';

  const { createClient } = supabase;
  const sb = createClient(
    'https://axhhkmobmvkznmkiplso.supabase.co',
    'sb_publishable_f0T6tAUq16w1d9s4Dssv-Q_y4OMLaYx'
  );

  let currentUser  = null;
  let currentAudio = null;
  let currentBtn   = null;
  let activeFilter = 'all';
  let refreshTimer = null;
  const player     = document.getElementById('player');

  const RECORDING_TYPES = new Set(['stream_detected', 'recording_started', 'recording_complete', 'upload_complete']);
  const USER_TYPES      = new Set(['login', 'signup', 'download', 'delete']);

  async function init() {
    const { data: { session } } = await sb.auth.getSession();
    if (!session) { window.location.href = 'index.html'; return; }

    const djName = session.user.user_metadata?.dj_name;
    if (djName !== ADMIN_DJ) { window.location.href = 'dashboard.html'; return; }

    currentUser = session.user;
    document.getElementById('nav-dj-name').textContent = djName;

    await Promise.all([loadAllDJs(), loadEventLogs()]);

    // Auto-refresh event log every 30s
    refreshTimer = setInterval(loadEventLogs, 30000);
  }

  // ── DJs ──────────────────────────────────────────────────

  async function loadAllDJs() {
    const { data: folders, error } = await sb.storage
      .from('recordings')
      .list('', { sortBy: { column: 'name', order: 'asc' } });

    const container = document.getElementById('dj-list-container');

    if (error || !folders || folders.length === 0) {
      container.innerHTML = '<div class="empty-log">No DJ folders found.</div>';
      return;
    }

    // Only show folders (items without an extension)
    const djs = folders.filter(f => !f.name.includes('.'));

    if (djs.length === 0) {
      container.innerHTML = '<div class="empty-log">No DJ folders found.</div>';
      return;
    }

    // Load each DJ's recording list in parallel
    const djData = await Promise.all(djs.map(async (folder) => {
      const { data: files } = await sb.storage
        .from('recordings')
        .list(folder.name, { sortBy: { column: 'created_at', order: 'desc' } });
      const mp3s = (files || []).filter(f => f.name.endsWith('.mp3'));
      const size = mp3s.reduce((acc, f) => acc + (f.metadata?.size || 0), 0);
      return { name: folder.name, files: mp3s, size };
    }));

    // Global stats
    const totalRecordings = djData.reduce((acc, d) => acc + d.files.length, 0);
    const totalSize       = djData.reduce((acc, d) => acc + d.size, 0);
    document.getElementById('stat-djs').textContent        = djData.length;
    document.getElementById('stat-recordings').textContent = totalRecordings;
    document.getElementById('stat-size').textContent       = formatBytes(totalSize);
    document.getElementById('stats').style.display         = 'flex';
    document.getElementById('page-subtitle').textContent   =
      `${djData.length} DJ${djData.length !== 1 ? 's' : ''} · ${totalRecordings} recording${totalRecordings !== 1 ? 's' : ''}`;

    container.innerHTML = '';
    const list = document.createElement('div');
    list.className = 'dj-list';

    for (const dj of djData) {
      const row = document.createElement('div');
      row.className = 'dj-row';

      const lastDate = dj.files[0]?.created_at ? formatDate(dj.files[0].created_at) : '—';

      row.innerHTML = `
        <div class="dj-header" onclick="toggleDJ(this)">
          <div class="dj-name-big">${dj.name}</div>
          <div class="dj-meta">${dj.files.length} recording${dj.files.length !== 1 ? 's' : ''}</div>
          <div class="dj-meta">${formatBytes(dj.size)}</div>
          <div class="dj-meta">Last: ${lastDate}</div>
          <button class="expand-btn">▶ View</button>
        </div>
        <div class="dj-recordings">
          <div class="dj-recordings-inner" id="files-${dj.name}"></div>
        </div>
      `;

      list.appendChild(row);

      // Pre-render recordings (hidden until expanded)
      const filesEl = row.querySelector(`#files-${dj.name}`);
      if (dj.files.length === 0) {
        filesEl.innerHTML = '<div class="empty-log">No recordings yet.</div>';
      } else {
        for (const file of dj.files) {
          const { data: urlData } = await sb.storage
            .from('recordings')
            .createSignedUrl(`${dj.name}/${file.name}`, 3600);
          const url  = urlData?.signedUrl;
          const size = formatBytes(file.metadata?.size || 0);
          const date = formatDate(file.created_at);
          const id   = 'ap-' + Math.random().toString(36).slice(2);

          const item = document.createElement('div');
          item.className = 'recording-item';
          item.dataset.size     = file.metadata?.size || 0;
          item.dataset.djname   = dj.name;
          item.dataset.filename = file.name;
          item.innerHTML = `
            <div>
              <div class="recording-name">${file.name.replace('.mp3', '')}</div>
              <div class="recording-meta">${date} · ${size}</div>
            </div>
            <div class="player-wrap">
              <button class="play-btn" id="${id}" onclick="togglePlay('${url}', '${file.name}', '${id}')">
                <svg viewBox="0 0 24 24"><path d="M8 5v14l11-7z"/></svg>
              </button>
              <a class="action-btn" href="${url}" download="${file.name}">↓ Download</a>
              <button class="action-btn danger" onclick="deleteRecording(this)">✕ Delete</button>
            </div>
          `;
          filesEl.appendChild(item);
        }
      }
    }

    container.appendChild(list);
  }

  function toggleDJ(header) {
    const panel = header.nextElementSibling;
    const btn   = header.querySelector('.expand-btn');
    const open  = panel.classList.toggle('open');
    btn.textContent = open ? '▼ Hide' : '▶ View';
  }

  // ── Recording actions ──────────────────────────────────

  async function deleteRecording(btn) {
    const item     = btn.closest('.recording-item');
    const djName   = item.dataset.djname;
    const fileName = item.dataset.filename;

    if (!confirm(`Delete "${fileName.replace('.mp3', '')}" from ${djName}?\nThis cannot be undone.`)) return;

    btn.disabled    = true;
    btn.textContent = 'Deleting...';

    const playBtn = item.querySelector('.play-btn');
    if (currentBtn === playBtn) stopAudio();

    const { error } = await sb.storage
      .from('recordings')
      .remove([`${djName}/${fileName}`]);

    if (error) {
      btn.disabled    = false;
      btn.textContent = '✕ Delete';
      alert('Failed to delete: ' + error.message);
      return;
    }

    item.style.transition = 'opacity 0.3s, transform 0.3s';
    item.style.opacity    = '0';
    item.style.transform  = 'translateX(-10px)';
    setTimeout(() => {
      item.remove();
      updateGlobalStats();
    }, 300);
  }

  function updateGlobalStats() {
    const allItems    = document.querySelectorAll('.recording-item');
    const totalRec    = allItems.length;
    const totalSize   = Array.from(allItems).reduce((acc, el) => acc + parseInt(el.dataset.size || 0, 10), 0);
    const djRows      = document.querySelectorAll('.dj-row').length;

    document.getElementById('stat-recordings').textContent = totalRec;
    document.getElementById('stat-size').textContent       = formatBytes(totalSize);
    document.getElementById('page-subtitle').textContent   =
      `${djRows} DJ${djRows !== 1 ? 's' : ''} · ${totalRec} recording${totalRec !== 1 ? 's' : ''}`;
  }

  // ── Audio ─────────────────────────────────────────────

  function togglePlay(url, name, btnId) {
    const btn = document.getElementById(btnId);
    if (currentAudio === url && !player.paused) {
      player.pause();
      setPlayIcon(btn, false);
      document.getElementById('now-playing').classList.remove('visible');
      currentAudio = null; currentBtn = null; return;
    }
    if (currentBtn) setPlayIcon(currentBtn, false);
    player.src = url; player.play();
    currentAudio = url; currentBtn = btn;
    setPlayIcon(btn, true);
    document.getElementById('np-name').textContent = name.replace('.mp3', '');
    document.getElementById('now-playing').classList.add('visible');
  }

  function setPlayIcon(btn, playing) {
    btn.innerHTML = playing
      ? `<svg viewBox="0 0 24 24"><path d="M6 19h4V5H6v14zm8-14v14h4V5h-4z"/></svg>`
      : `<svg viewBox="0 0 24 24"><path d="M8 5v14l11-7z"/></svg>`;
  }

  function stopAudio() {
    player.pause(); player.src = '';
    if (currentBtn) setPlayIcon(currentBtn, false);
    document.getElementById('now-playing').classList.remove('visible');
    currentAudio = null; currentBtn = null;
  }

  player.addEventListener('ended', () => {
    if (currentBtn) setPlayIcon(currentBtn, false);
    document.getElementById('now-playing').classList.remove('visible');
    currentAudio = null; currentBtn = null;
  });

  // ── Event log ─────────────────────────────────────────

  function setFilter(filter, btn) {
    activeFilter = filter;
    document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
    loadEventLogs();
  }

  async function loadEventLogs() {
    const container = document.getElementById('log-container');

    let query = sb.from('event_logs')
      .select('*')
      .order('created_at', { ascending: false })
      .limit(150);

    if (activeFilter === 'recording') {
      query = query.in('event_type', [...RECORDING_TYPES]);
    } else if (activeFilter === 'user') {
      query = query.in('event_type', [...USER_TYPES]);
    }

    const { data: events, error } = await query;

    const now = new Date();
    document.getElementById('refresh-label').textContent =
      'Updated ' + now.toLocaleTimeString('en-US', { hour: '2-digit', minute: '2-digit' });

    if (error) {
      container.innerHTML = `<div class="empty-log">Could not load events: ${error.message}</div>`;
      return;
    }

    if (!events || events.length === 0) {
      container.innerHTML = '<div class="empty-log">No events yet.</div>';
      return;
    }

    const rows = events.map(e => {
      const type    = e.event_type || 'unknown';
      const details = e.details ? JSON.stringify(e.details).replace(/[{}"]/g, '').replace(/,/g, ' · ') : '';
      const time    = new Date(e.created_at).toLocaleString('en-US', {
        month: 'short', day: 'numeric',
        hour: '2-digit', minute: '2-digit', second: '2-digit'
      });
      return `
        <tr>
          <td style="white-space:nowrap;color:var(--muted)">${time}</td>
          <td><span class="event-type ${type}">${type.replace(/_/g, ' ')}</span></td>
          <td style="color:var(--gold)">${e.dj_name || '—'}</td>
          <td class="log-detail">${details}</td>
        </tr>`;
    }).join('');

    container.innerHTML = `
      <table class="log-table">
        <thead>
          <tr>
            <th>Time</th>
            <th>Event</th>
            <th>DJ</th>
            <th>Details</th>
          </tr>
        </thead>
        <tbody>${rows}</tbody>
      </table>`;
  }

  // ── Auth ──────────────────────────────────────────────

  async function logout() {
    clearInterval(refreshTimer);
    await sb.auth.signOut();
    window.location.href = 'index.html';
  }

  // ── Helpers ───────────────────────────────────────────

  function formatBytes(bytes) {
    if (!bytes) return '—';
    if (bytes < 1048576) return (bytes / 1024).toFixed(1) + ' KB';
    if (bytes < 1073741824) return (bytes / 1048576).toFixed(1) + ' MB';
    return (bytes / 1073741824).toFixed(1) + ' GB';
  }

  function formatDate(str) {
    if (!str) return '—';
    return new Date(str).toLocaleDateString('en-US', { month: 'short', day: 'numeric', year: 'numeric' });
  }

  init();
</script>
</body>
</html>
